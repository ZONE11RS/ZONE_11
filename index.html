<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku Zone - Player Test</title>
    <style>
        /* UI/UX Design - مستوحى من المواقع الاحترافية */
        body { background-color: #0b0b0b; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .player-wrapper { width: 95%; max-width: 800px; background: #161616; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }

        /* قائمة السيرفرات */
        .server-bar { background: #222; padding: 10px; display: flex; gap: 10px; border-bottom: 1px solid #333; }
        .server-btn { background: #333; border: none; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .server-btn.active { background: #e50914; } /* لون أحمر مثل Otaku Zone */

        /* حاوية الفيديو */
        .video-container { position: relative; width: 100%; padding-top: 56.25%; /* نسبة 16:9 */ background: #000; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* أزرار التحكم عبر الـ API */
        .api-controls { padding: 15px; display: flex; justify-content: space-around; background: #1a1a1a; }
        .control-btn { background: transparent; border: 1px solid #e50914; color: #e50914; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .control-btn:hover { background: #e50914; color: white; }
    </style>
</head>
<body>

<div class="player-wrapper">
    <div class="server-bar">
        <button class="server-btn active" onclick="changeServer('https://otaku-zone.seekplayer.vip/#VIDEO_ID&api=otakuzone.pages.dev', this)">سيرفر 1 (Seek)</button>
        <button class="server-btn" onclick="changeServer('https://dood.to/e/VIDEO_ID', this)">سيرفر 2 (Dood)</button>
    </div>

    <div class="video-container">
        <iframe id="otakuIframe" src="https://otaku-zone.seekplayer.vip/#VIDEO_ID&api=otakuzone.pages.dev" allowfullscreen></iframe>
    </div>

    <div class="api-controls">
        <button class="control-btn" onclick="sendCommand('seek', 90)">+90ث (تخطي البداية)</button>
        <button class="control-btn" onclick="sendCommand('pause', null)">إيقاف مؤقت</button>
        <button class="control-btn" onclick="sendCommand('play', null)">تشغيل</button>
    </div>
</div>

<script>
    const iframe = document.getElementById('otakuIframe');
    const targetOrigin = 'https://otaku-zone.seekplayer.vip';

    // وظيفة تبديل السيرفرات (UI)
    function changeServer(url, btn) {
        iframe.src = url;
        document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // وظيفة إرسال الأوامر للـ API (UX)
    function sendCommand(cmd, val) {
        // هذه هي الطريقة التي "يتحدث" بها موقعك مع الـ Iframe
        const message = {
            command: cmd,
            value: val
        };
        iframe.contentWindow.postMessage(message, targetOrigin);
        console.log("تم إرسال أمر: " + cmd);
    }

    // استلام البيانات من المشغل (مثلاً لمعرفة أين توقف المشاهد)
    window.addEventListener('message', function(event) {
        if (event.origin !== targetOrigin) return;
        
        // هنا يمكنك حفظ الوقت في LocalStorage
        if (event.data.type === 'timeupdate') {
            console.log("الوقت الحالي: " + event.data.value);
        }
    });
</script>

</body>
</html>
