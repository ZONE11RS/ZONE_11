<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تطوير مشغل Otaku Zone</title>
    <style>
        body { background: #000; display: flex; justify-content: center; padding-top: 50px; }
        .player-box { width: 800px; height: 450px; border: 2px solid #ff0000; border-radius: 10px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="player-box">
    <iframe id="otakuPlayer" src="https://otaku-zone.seekplayer.vip/#ID_الحلقة&api=zone11rs.github.io" allowfullscreen></iframe>
</div>

<script>
    const player = document.getElementById('otakuPlayer');
    const serverOrigin = 'https://otaku-zone.seekplayer.vip';

    // بمجرد تحميل الـ iframe، نرسل له أوامر تغيير الـ UI الداخلي
    player.onload = function() {
        console.log("تم تحميل المشغل.. بدأ التطوير الداخلي...");
        
        // 1. تغيير الألوان الداخلية للمشغل (Theme Color)
        customizePlayer('setTheme', '#ff0000'); 

        // 2. إخفاء شعار السيرفر (إذا كان مسموحاً في حسابك)
        customizePlayer('hideLogo', true);

        // 3. إعدادات التشغيل التلقائي والترجمة
        customizePlayer('setVolume', 80);
    };

    // الوظيفة البرمجية التي "تخترق" الـ iframe لتعديله
    function customizePlayer(command, value) {
        const message = {
            cmd: command,
            val: value,
            source: 'OtakuZone_App'
        };
        
        // إرسال الأمر لداخل المشغل
        player.contentWindow.postMessage(JSON.stringify(message), serverOrigin);
    }

    // الاستماع للمشغل (إذا أرسل لنا أي بيانات عن حالته الداخلية)
    window.addEventListener('message', function(event) {
        if (event.origin !== serverOrigin) return;
        
        try {
            const data = JSON.parse(event.data);
            console.log("وصلت بيانات من داخل المشغل:", data);
        } catch(e) {
            // تجاهل الرسائل التي ليست بتنسيق JSON
        }
    });
</script>

</body>
</html>
