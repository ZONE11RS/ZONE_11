<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku Zone - عالم الأنمي</title>
    
    <!-- ربط صورة IMG_20260512_114726_2.jpg كأيقونة للمتصفح -->
    <link rel="icon" type="image/jpeg" href="IMG_20260512_114726_2.jpg">
    <link rel="apple-touch-icon" href="IMG_20260512_114726_2.jpg">

    <style>
        body {
            background-color: #0b0b0b; /* خلفية داكنة تناسب الأنمي */
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .header {
            text-align: center;
        }

        /* تنسيق الشعار ليظهر بشكل احترافي */
        .logo {
            width: 150px;
            height: 150px;
            border-radius: 15px; /* حواف ناعمة */
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); /* توهج أحمر خفيف */
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            letter-spacing: 2px;
        }

        .status {
            color: #00ff00;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header">
        <!-- عرض صورة IMG_20260512_114726_2.jpg كشعار رئيسي -->
        <img src="IMG_20260512_114726_2.jpg" alt="Otaku Zone Logo" class="logo">
        <h1>OTAKU ZONE</h1>
        <p class="status">الموقع قيد التطوير عبر Cloudflare Pages</p>
    </div>

</body>
</html>
