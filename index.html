<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; }
        /* تصميم الحاوية لتشبه Blkom */
        .player-container { 
            max-width: 800px; margin: 40px auto; 
            border: 1px solid #333; border-radius: 12px; overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
        }
        iframe { width: 100%; height: 450px; border: none; }
        .info { color: #ff0000; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <h3>Otaku Zone - UI Internal Test</h3>

    <div class="player-container">
        <iframe id="otakuPlayer" src="https://seekstreaming.com/embed-YOUR_VIDEO_ID.html?api=zone11rs.github.io" allowfullscreen></iframe>
    </div>

    <div id="status" class="info">جاري محاولة تغيير لون زر Play للأحمر...</div>

    <script>
        const player = document.getElementById('otakuPlayer');
        const myToken = "d49f4971ed032005980c7443";

        player.onload = function() {
            // الأمر البرمجي لتغيير الـ UI الداخلي
            const config = {
                api_token: myToken,
                command: 'setTheme', // جرب 'updateSettings' إذا لم يعمل هذا
                value: {
                    primaryColor: '#ff0000', // هذا ما سيجعل الزر أحمر
                    showLogo: false
                }
            };

            // إرسال الأمر للمشغل
            player.contentWindow.postMessage(JSON.stringify(config), '*');
            document.getElementById('status').innerText = "تم إرسال أوامر التخصيص بنجاح!";
        };
    </script>
</body>
</html>
