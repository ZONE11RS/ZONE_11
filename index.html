<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <style>
        .player-wrapper { position: relative; width: 800px; height: 450px; background: #000; margin: auto; border-radius: 12px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* الطبقة الخارجية التي ستغطي الزر الأزرق */
        .custom-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); /* تعتيم بسيط */
            display: flex; justify-content: center; align-items: center;
            z-index: 10; cursor: pointer; transition: 0.5s;
        }
        
        /* زر التشغيل الأحمر الخاص بك */
        .play-btn-red {
            width: 80px; height: 80px; background: #ff0000; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 20px rgba(255,0,0,0.5); transition: 0.3s;
        }
        .play-btn-red:hover { transform: scale(1.1); background: #cc0000; }
        .play-btn-red svg { fill: white; width: 40px; margin-left: 5px; }

        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div class="player-wrapper">
    <div class="custom-overlay" id="overlay" onclick="startVideo()">
        <div class="play-btn-red">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
    </div>

    <iframe id="mainPlayer" src="https://otaku-zone.seekplayer.vip/#5jbhu" allow="autoplay"></iframe>
</div>

<script>
    function startVideo() {
        const overlay = document.getElementById('overlay');
        const iframe = document.getElementById('mainPlayer');
        
        // 1. إخفاء الطبقة الحمراء
        overlay.classList.add('hidden');
        
        // 2. أمر المشغل بالبدء تلقائياً (عبر الـ API المتاح)
        iframe.contentWindow.postMessage(JSON.stringify({ "event": "command", "func": "playVideo" }), '*');
        
        // إذا لم يدعم السيرفر التشغيل التلقائي، سيضطر المستخدم لضغطة ثانية، 
        // لكن على الأقل الشكل الأول الذي رآه كان احترافياً وباللون الأحمر.
    }
</script>

</body>
</html>
