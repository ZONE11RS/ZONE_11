<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku Zone Player - UI Test</title>
    <style>
        body { background: #000; color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .player-wrapper { width: 95%; max-width: 850px; border: 1px solid #333; border-radius: 12px; overflow: hidden; box-shadow: 0 0 40px rgba(255, 0, 0, 0.3); }
        iframe { width: 100%; height: 480px; border: none; background: #000; }
        .status-bar { padding: 10px; font-size: 12px; color: #666; background: #111; }
    </style>
</head>
<body>

<div class="player-wrapper">
    <iframe id="videoPlayer" src="https://otaku-zone.seekplayer.vip/#5jbhu&api=zone11rs.github.io" allowfullscreen></iframe>
    <div class="status-bar" id="status">جاري الاتصال بـ UI المشغل...</div>
</div>

<script>
    const iframe = document.getElementById('videoPlayer');
    const myToken = "d49f4971ed032005980c7443"; // التوكن الخاص بك من الصورة

    // وظيفة إرسال الأوامر لتغيير التصميم الداخلي
    function updateInternalUI() {
        const config = {
            api_token: myToken,
            action: 'set_player_style', // الكود الذي يفهمه SeekStreaming
            params: {
                primary_color: '#ff0000', // تحويل الزر للأحمر
                auto_play: false,
                hide_logo: true
            }
        };

        // إرسال "الأعصاب" لداخل المشغل
        iframe.contentWindow.postMessage(JSON.stringify(config), '*');
        document.getElementById('status').innerText = "تم تحديث الواجهة: اللون الأحمر مفعل ✅";
    }

    // انتظر المشغل حتى يبدأ ثم أرسل الأوامر
    window.addEventListener('message', function(event) {
        // إذا أرسل المشغل رسالة "جاهز" (Ready)
        if (event.data && event.data.type === 'ready') {
            updateInternalUI();
        }
    });

    // كخيار احتياطي عند تحميل الصفحة
    iframe.onload = updateInternalUI;
</script>

</body>
</html>
