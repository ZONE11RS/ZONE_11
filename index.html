<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <style>
        :root { --main-color: #ff0000; --bg-dark: #080808; --card-bg: #121212; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }

        /* الحاوية الرئيسية - Modal Style */
        .player-card { 
            max-width: 900px; margin: auto; background: var(--card-bg); 
            border-radius: 12px; overflow: hidden; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid #222;
        }

        /* قائمة السيرفرات - تصميم عصري */
        .server-tabs { 
            display: flex; background: #1a1a1a; padding: 5px; gap: 5px; 
            border-bottom: 1px solid #222;
        }
        .server-tabs button {
            flex: 1; border: none; background: transparent; color: #888;
            padding: 10px; cursor: pointer; transition: 0.4s; font-weight: 600;
            border-radius: 8px; font-size: 13px;
        }
        .server-tabs button.active { background: var(--main-color); color: white; box-shadow: 0 4px 15px rgba(255,0,0,0.3); }

        /* منطقة الفيديو */
        .video-box { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* أزرار التحكم الاحترافية - Floating style */
        .smart-controls { 
            display: flex; justify-content: center; align-items: center; 
            padding: 20px; gap: 15px; background: linear-gradient(to top, #111, #161616);
        }
        .btn-action {
            background: #1f1f1f; border: 1px solid #333; color: white;
            padding: 12px 20px; border-radius: 50px; cursor: pointer;
            transition: 0.3s; font-size: 14px; display: flex; align-items: center; gap: 8px;
        }
        .btn-action:hover { border-color: var(--main-color); background: #252525; transform: translateY(-2px); }
        .btn-primary { background: var(--main-color); border: none; font-weight: bold; }
        .btn-primary:hover { background: #cc0000; box-shadow: 0 0 20px rgba(255,0,0,0.4); }

        /* لمسة جمالية: نص تحت المشغل */
        .player-footer { padding: 10px 20px; font-size: 12px; color: #555; text-align: center; border-top: 1px solid #222; }
    </style>
</head>
<body>

<div class="player-card">
    <div class="server-tabs">
        <button class="active">سيرفر 1 (Seek)</button>
        <button>سيرفر 2 (Dood)</button>
        <button>سيرفر 3 (Lions)</button>
    </div>

    <div class="video-box">
        <iframe src="YOUR_EMBED_URL_HERE"></iframe>
    </div>

    <div class="smart-controls">
        <button class="btn-action">⏮ 10ث</button>
        <button class="btn-action btn-primary">▶ تشغيل</button>
        <button class="btn-action">⏸ إيقاف</button>
        <button class="btn-action">تخطي البداية ⏩</button>
    </div>
    
    <div class="player-footer">
        Otaku Zone Player v2.0 - التجربة الاحترافية
    </div>
</div>

</body>
</html>
